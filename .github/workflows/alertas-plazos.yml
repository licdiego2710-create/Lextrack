name: Alertas de Plazos Procesales

on:
  schedule:
    # 8:00am hora México (UTC-6) = 14:00 UTC
    - cron: '0 14 * * 1-5'    # Lunes a Viernes
  workflow_dispatch:          # Ejecución manual desde GitHub

jobs:
  alertas-diarias:
    name: Enviar Alertas Diarias de Vencimiento
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json

      - name: Instalar dependencias
        working-directory: scripts
        run: npm install

      - name: Ejecutar Script de Alertas
        working-directory: scripts
        env:
          SUPABASE_URL:               ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY:  ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY:             ${{ secrets.RESEND_API_KEY }}
        run: node alertas.js
