name: CJF Amparos — Sync Acuerdos

on:
  schedule:
    # 10:00am hora México (UTC-6) = 16:00 UTC — después del boletín CJJ
    - cron: '0 16 * * 1-5'   # Lun–Vie en México
  workflow_dispatch:
    inputs:
      despacho_id:
        description: 'UUID del despacho (vacío = todos)'
        required: false

jobs:
  sync-amparos-cjf:
    name: Consultar CJF por amparo y guardar acuerdos nuevos
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json

      - name: Instalar dependencias
        working-directory: scripts
        run: npm install

      - name: Instalar Playwright Chromium
        working-directory: scripts
        run: npx playwright install chromium --with-deps

      - name: Sincronizar acuerdos CJF
        id: sync
        working-directory: scripts
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          DESPACHO="${{ github.event.inputs.despacho_id }}"
          if [ -n "$DESPACHO" ]; then
            node services/cjfAmparosSyncService.js "despacho:$DESPACHO"
          else
            node services/cjfAmparosSyncService.js all
          fi
        continue-on-error: true

      - name: Reintento (si falló)
        if: steps.sync.outcome == 'failure'
        working-directory: scripts
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          echo "Esperando 5 minutos antes de reintentar..."
          sleep 300
          node services/cjfAmparosSyncService.js all

      - name: Resumen
        if: always()
        run: |
          echo "### CJF Amparos Sync — $(date '+%Y-%m-%d')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Métrica | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Acuerdos nuevos detectados | ${{ steps.sync.outputs.acuerdos_nuevos || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Estado | ${{ steps.sync.outcome }} |" >> $GITHUB_STEP_SUMMARY
